name: Docs Hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-hygiene:
    name: docs-hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: npm ci

      - name: Run docs hygiene gate
        run: just tool
